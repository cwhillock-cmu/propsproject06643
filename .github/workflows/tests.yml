name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Install IDAES solver extensions (IPOPT)
        run: idaes get-extensions --verbose

      - name: Add IDAES bin directory to PATH
        run: |
          idaes_bin="$(idaes bin-directory)"
          echo "IDAES bin directory: $idaes_bin"
          ls -l "$idaes_bin"
          echo "$idaes_bin" >> "$GITHUB_PATH"

      - name: Verify IPOPT
        run: ipopt -v

      - name: Run pytest with coverage
        run: pytest --cov=idaes_props --cov-report=term --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
